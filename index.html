<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>意识频率共鸣评估</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: #0c0d0f; color: #d1d1d1; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
#app { width: 92%; max-width: 450px; background: #151719; border: 1px solid #303235; padding: 30px; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; }
.header { text-align: center; border-bottom: 1px solid #c9a06344; padding-bottom: 15px; margin-bottom: 25px; }
.header h2 { color: #c9a063; font-size: 1rem; margin: 0; letter-spacing: 2px; }
#q { font-size: 1.05rem; line-height: 1.6; margin-bottom: 30px; min-height: 70px; color: #fff; }
.btn { display: block; width: 100%; background: #1f2124; border: 1px solid #3d4043; color: #ccc; padding: 16px; margin-bottom: 12px; border-radius: 6px; text-align: left; font-size: 0.95rem; cursor: pointer; transition: 0.2s; }
.btn:active { background: #c9a06322; border-color: #c9a063; color: #fff; }
#res { display: none; text-align: center; animation: fadeIn 0.8s; }
.role-name { font-size: 1.8rem; color: #c9a063; margin: 20px 0; font-weight: bold; }
.desc { font-size: 0.95rem; line-height: 1.7; color: #bbb; text-align: left; background: #0c0d0f; padding: 20px; border-radius: 8px; border-left: 3px solid #c9a063; }
.amis-style { color: #b19cd9 !important; text-shadow: 0 0 10px rgba(177, 156, 217, 0.5); }
.knife { color: #666; font-size: 0.85rem; font-style: italic; margin-top: 25px; border-top: 1px solid #333; padding-top: 15px; }
#prog-fill { height: 3px; background: #c9a063; position: absolute; top: 0; left: 0; width: 0%; transition: 0.4s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div id="app">
    <div id="prog-fill"></div>
    <div class="header"><h2>频率共鸣同步中</h2></div>
    <div id="game">
        <div id="q">载入中...</div>
        <div id="btns"></div>
    </div>
    <div id="res">
        <p style="font-size:0.8rem; color:#666;">同步完成，共鸣频率趋近于：</p>
        <div id="role" class="role-name"></div>
        <div id="desc" class="desc"></div>
        <div id="knife" class="knife"></div>
    </div>
</div>

<script>
// j=忌炎, l=长离, c=椿, s=守岸人, p=漂泊者, z=赞妮, f=弗洛洛, a=爱弥斯
const questions = [
    {q: "你在一个完全陌生的地方醒来，身边只有一件必需品，你会选择：", a: ["一把能够自卫的锋利长剑", "p"], b: ["一份详细且逻辑缜密的地图", "l"]},
    {q: "当你在执行一项繁琐的重复性工作，且已经极度疲惫时，你会：", a: ["虽然满心抱怨，但还是会强撑着按时完成", "z"], b: ["冷静地思考如何通过某种手段提高效率或规避它", "f"]},
    {q: "你如何看待“离别”这件事？", a: ["离别是文明前进的必然，不应沉溺其中", "x"], b: ["即使注定消失，也想在那之前留下被铭记的痕迹", "a"]},
    {q: "面对一个几乎不可能战胜的混乱局面，你会：", a: ["召集志同道合的人，构筑最稳固的防线", "j"], b: ["在混乱中寻找乐趣，看看事态会如何失控", "c"]},
    {q: "路边有一个被遗弃、已经损坏的旧物件，你会：", a: ["觉得有些心疼，想尝试修好它并带走", "a"], b: ["分析它的构造和损毁原因，记录其历史价值", "l"]},
    {q: "如果有人要在你最想休息的时候给你增加负担：", a: ["即便非常不爽，也会因为责任感而接手", "z"], b: ["不动声色地观察对方，寻找拒绝或反制的契机", "f"]},
    {q: "你认为一个人最强大的武器应该是：", a: ["不被任何规则束缚的绝对自由", "c"], b: ["对万物规律的洞察与精准的布局", "l"]},
    {q: "关于“故乡”或“归宿”，你更倾向于：", a: ["即使身在远方，也要时刻守护那里的安宁", "j"], b: ["那是一个遥远的坐标，我正跨越星海去寻它", "s"]},
    {q: "如果可以拥有一个终极假期，你最想：", a: ["找一个没人打扰的角落，彻底睡个好觉", "z"], b: ["站在高处俯瞰众生，规划下一场变革", "f"]},
    {q: "当生命中一个温柔的幻影即将消失在繁星中：", a: ["哪怕只有万分之一的机会，也要尝试挽留", "a"], b: ["默默致意，带着这份记忆继续未竟的旅途", "p"]}
];

let idx = 0, sc = {j:0, l:0, x:0, c:0, s:0, p:0, z:0, f:0, a:0};

function render() {
    const d = questions[idx];
    document.getElementById('q').innerText = (idx + 1) + ". " + d.q;
    document.getElementById('btns').innerHTML = `
        <button class="btn" onclick="next('${d.a[1]}')">${d.a[0]}</button>
        <button class="btn" onclick="next('${d.b[1]}')">${d.b[0]}</button>
    `;
    document.getElementById('prog-fill').style.width = ((idx/questions.length)*100) + '%';
}

function next(t) {
    sc[t]++; idx++;
    if(idx < questions.length) render(); else show();
}

function show() {
    document.getElementById('game').style.display = 'none';
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('res').style.display = 'block';
    
    let k = 'p';
    if(sc.a >= 3) k = 'a'; 
    else k = Object.keys(sc).reduce((a, b) => sc[a] > sc[b] ? a : b);

    const lib = {
        j: ["忌炎", "统帅之魂。你拥有坚毅的意志，在风暴中是众人最可靠的盾牌。"],
        l: ["长离", "深邃谋士。你擅长博弈，在静默中运筹帷幄，引导万物走向。"],
        c: ["椿", "自由之火。你拒绝束缚，热烈且迷人，只在极致的体验中寻找意义。"],
        s: ["守岸人", "静谧守望。你跨越漫长时光，在星海的尽头守望着那份唯一的契约。"],
        p: ["漂泊者", "开拓之星。你从未知中觉醒，每一步选择都在重塑这个世界的未来。"],
        z: ["赞妮", "坚韧社畜。虽然总是睡眠不足且渴望假期，但你务实且极度可靠，是支撑秩序运行的基石。"],
        f: ["弗洛洛", "冷酷执行。你习惯从高位审视文明，优雅地推行你的意志，清除一切阻碍。"],
        a: ["爱弥斯", "温柔回响。你不曾离去，因为那份心碎而美丽的共鸣，已活在重要的人的记忆里。"]
    };

    const res = lib[k];
    const rEl = document.getElementById('role');
    rEl.innerText = res[0];
    document.getElementById('desc').innerText = res[1];
    
    if(k === 'a') {
        rEl.classList.add('amis-style');
        document.getElementById('knife').innerHTML = "“漂泊者，你看...我变成你此时此刻的一点点心痛了。这就是我存在的证明，对吗？”";
    }
}
render();
</script>
</body>
</html>
